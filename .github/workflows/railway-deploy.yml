name: Deploy Victory to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: 080ddbc3-57d5-4164-9bb3-e07c409d6782
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Railway CLI
        run: |
          bash <(curl -fsSL https://railway.com/install.sh)
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Verify Railway CLI
        run: railway --version

      - name: Deploy backend
        run: railway up backend --path-as-root --service victory-backend --project "$RAILWAY_PROJECT_ID" --detach --message "GitHub auto-deploy backend"

      - name: Deploy frontend
        run: railway up frontend --path-as-root --service victory-frontend --project "$RAILWAY_PROJECT_ID" --detach --message "GitHub auto-deploy frontend"
