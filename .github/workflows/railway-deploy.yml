name: Deploy Victory to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_PROJECT_ID: 080ddbc3-57d5-4164-9bb3-e07c409d6782
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Railway CLI
        run: |
          bash <(curl -fsSL https://railway.com/install.sh)
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Verify Railway CLI
        run: railway --version

      - name: Configure Railway CLI auth
        env:
          RAILWAY_USER_ID: ${{ secrets.RAILWAY_USER_ID }}
          RAILWAY_ACCESS_TOKEN: ${{ secrets.RAILWAY_ACCESS_TOKEN }}
          RAILWAY_REFRESH_TOKEN: ${{ secrets.RAILWAY_REFRESH_TOKEN }}
          RAILWAY_TOKEN_EXPIRES_AT: ${{ secrets.RAILWAY_TOKEN_EXPIRES_AT }}
        run: |
          mkdir -p "$HOME/.railway"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          config = {
              "projects": {},
              "user": {
                  "id": os.environ["RAILWAY_USER_ID"],
                  "token": None,
                  "accessToken": os.environ["RAILWAY_ACCESS_TOKEN"],
                  "refreshToken": os.environ["RAILWAY_REFRESH_TOKEN"],
                  "tokenExpiresAt": int(os.environ["RAILWAY_TOKEN_EXPIRES_AT"]),
              },
              "editor": None,
              "linkedFunctions": None,
          }
          Path.home().joinpath(".railway", "config.json").write_text(json.dumps(config))
          PY

      - name: Deploy backend
        working-directory: backend
        run: railway up --service victory-backend --project "$RAILWAY_PROJECT_ID" --environment production --detach --message "GitHub auto-deploy backend"

      - name: Deploy frontend
        working-directory: frontend
        run: railway up --service victory-frontend --project "$RAILWAY_PROJECT_ID" --environment production --detach --message "GitHub auto-deploy frontend"
